<div class="close-button d-flex justify-content-end" style="margin: 5px; position: absolute; top: 0; right: 0;">
    <button class="btn-close1" mat-icon-button (click)="closeDialog()">X</button>
</div>
<div class="container-fluid view-order login" style="padding: 20px;">
    <div>
      <div class="d-flex align-items-center mb-5">
        <h5 class="mb-0" style="font-weight: 700">
          Forgot Password
        </h5>
      </div>


    </div>

    <form
        [formGroup]="authenticationForm"
        class="signin-form">

        <div class="form-group">
            <mat-form-field class="w-100" appearance="outline">
            <mat-label class="filter-label">Username</mat-label>
            <input
                class="filter-text"
                id="inputEmail1"
                type="email"
                name="username"
                matInput
                placeholder="Username"
                formControlName="username"
                required=""
                autofocus=""
            />
            </mat-form-field>
        </div>

        <div class="form-group">
            <mat-form-field class="w-100" appearance="outline">
            <mat-label class="filter-label">Password</mat-label>
            <input
                class="filter-text"
                matInput
                id="inputPassword1"
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password"
                placeholder="Password"
                required=""
            />
            </mat-form-field>
            <span class="show-pass-icon" (click)="isShowPassword()">
            <mat-icon *ngIf="showPassword">visibility</mat-icon>
            <mat-icon *ngIf="!showPassword">visibility_off</mat-icon>
            </span>
        </div>

        <div class="form-group">
            <mat-form-field class="w-100" appearance="outline">
            <mat-label class="filter-label">Confirm Password</mat-label>
            <input
                class="filter-text"
                matInput
                id="inputPassword123"
                [type]="showConfirmPassword ? 'text' : 'password'"
                formControlName="confirmPassword"
                placeholder="Confirm Password"
                required=""
            />
            </mat-form-field>
            <span class="show-pass-icon" (click)="isshowConfirmPassword()">
            <mat-icon *ngIf="showConfirmPassword">visibility</mat-icon>
            <mat-icon *ngIf="!showConfirmPassword">visibility_off</mat-icon>
            </span>
        </div>

         <div class="form-group">
            <button class="form-control login-button" (click)="forgotPassword()">
               Reset Password
            </button>
        </div>

         <p *ngIf="samePassword" style="color: red;"> Both password should be same! </p>
    </form>
</div>
