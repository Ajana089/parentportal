<div class="main-content"  style="display: flex; flex-direction: column;">
    <section class="container-fluid white-bg">
      <form>
        <div>
          <div class="row">
            <div class="col-sm col-md-4">
                <mat-form-field class="full-width" appearance="outline">
                  <mat-label class="filter-label">School</mat-label>
                  <mat-select
                    placeholder="Select School"
                    [(ngModel)]="selectedSchool"
                    name="selectedSchool"
                    (selectionChange)="onChangeSchool($event.value)"
                  >
                    <mat-option *ngFor="let item of schools" [value]="item.Id" >
                      {{ item.school_address }}
                    </mat-option>
                  </mat-select>
                </mat-form-field>
              </div>
            <div class="col-sm col-md-4">
              <mat-form-field class="full-width" appearance="outline">
                <mat-label>From Date</mat-label>
                <input matInput [matDatepicker]="fromDatePicker" [(ngModel)]="from_date"
                name="from_date"
                (click)="fromDatePicker.open()" placeholder="Choose a From date">
                <mat-datepicker-toggle matSuffix [for]="fromDatePicker"></mat-datepicker-toggle>
                <mat-datepicker #fromDatePicker></mat-datepicker>
               
            </mat-form-field>
            </div>
            <div class="col-sm col-md-4">
              <mat-form-field class="full-width" appearance="outline">
                <mat-label>To Date</mat-label>
                <input
                  matInput
                  [matDatepicker]="toDatePicker"
                  placeholder="Choose a To date"
                  [(ngModel)]="to_date"
                  name="to_date"
                />
                <mat-datepicker-toggle
                  matSuffix
                  [for]="toDatePicker"
                ></mat-datepicker-toggle>
                <mat-datepicker #toDatePicker></mat-datepicker>
              </mat-form-field>
            </div>
  
          </div>
  
          <div class="row d-flex justify-content-end">
            <div class="col-md-auto col-sm-2 col">
              <button
                type="button"
                class="btn btn-success" 
                (click)="searchOrders()">
                Search Orders
              </button>
            </div>
            <div class="col-md-auto col-sm-2 col">
              <button  type="button" (click)="exporter.exportTable('csv')" class="btn btn-warning" >
                Export
              </button>
            </div>
          </div>
        </div>
      </form>
    </section>
    <div class="container-fluid product mt-5" style="display: flex; flex-direction: column; flex-grow: 1;">
      <div class="w-100 d-flex justify-content-end">
        <mat-form-field class="input-search" style="float: right; width: 350px; ">
          <mat-label>Search</mat-label>
          <input matInput (keyup)="applyFilter($event)" placeholder="" #input>
        </mat-form-field>
      </div>
      <div class="mat-elevation-z8" style="overflow: auto; flex-grow: 1;">
       
        <table
          mat-table
          matTableExporter 
          [dataSource]="dataSource"
          matSort
          (matSortChange)="announceSortChange($event)"
          #exporter="matTableExporter"
        >
          <!-- Order Number Column -->
          <ng-container matColumnDef="school_address">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by school_address"
            >
              School
            </th>
            <td mat-cell *matCellDef="let element">{{ element.school_address }}</td>
          </ng-container>

          <ng-container matColumnDef="order_date">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by order_date"
            >
            Order Date
            </th>
            <td mat-cell *matCellDef="let element">{{ element.order_date }}</td>
          </ng-container>
    
          <!-- Order Date Column -->
          <ng-container matColumnDef="sku">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by sku"
            >
              SKU
            </th>
            <td mat-cell *matCellDef="let element">{{ element.sku }}</td>
          </ng-container>

          <ng-container matColumnDef="item_name">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by item_name"
            >
              Item Name
            </th>
            <td mat-cell *matCellDef="let element">{{ element.item_name }}</td>
          </ng-container>
    
          <!-- Status Column -->
          <ng-container matColumnDef="unit_price">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by unit_price"
            >
            Price
            </th>
            <td mat-cell *matCellDef="let element">{{ element.unit_price }}</td>
          </ng-container>
    
          <!-- Family Number Column -->
          <ng-container matColumnDef="quantity">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by quantity"
            >
            Quantity
            </th>
            <td mat-cell *matCellDef="let element">{{ element.quantity }}</td>
          </ng-container>
    
          <!-- Total Column -->
          <ng-container matColumnDef="total_price">
            <th
              mat-header-cell
              *matHeaderCellDef
              mat-sort-header
              sortActionDescription="Sort by total_price"
            >
              Total Price
            </th>
            <td mat-cell *matCellDef="let element">{{ element.total_price }}</td>
          </ng-container>
    
          
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
    
        
      </div>
      <mat-paginator
          [pageSizeOptions]="[10, 50, 100]"
          showFirstLastButtons
          aria-label="Select page of periodic elements"
        >
        </mat-paginator>
    </div>
  </div>
  
  <div *ngIf="loading" class="cssload-container">
    <div class="cssload-speeding-wheel"></div>
  </div>
