<div class="main-content" style="display: flex; flex-direction: column">
  <section class="container-fluid white-bg">
    <form>
      <div>
        <div class="row" style="float: right;">
          <div class="col-md-auto col-sm-2 col">
            <button
              type="button"
              (click)="exporter.exportTable('csv')"
              class="btn btn-warning"
            >
              Export
            </button>
          </div>
        </div>
      </div>
    </form>
  </section>
  <div
    class="container-fluid product"
    style="display: flex; flex-direction: column; flex-grow: 1"
  >
    <div class="w-100 d-flex justify-content-end">
      <mat-form-field class="input-search" style="float: right; width: 350px">
        <mat-label>Search</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="" #input />
      </mat-form-field>
    </div>
    <div class="mat-elevation-z8" style="overflow: auto; flex-grow: 1">
      <table
        mat-table
        matTableExporter
        [dataSource]="dataSource"
        matSort
        (matSortChange)="announceSortChange($event)"
        #exporter="matTableExporter"
      >

         <ng-container matColumnDef="seq">
          <th mat-header-cell *matHeaderCellDef>Sr #</th>
          <td mat-cell *matCellDef="let element; let i = index">
            {{ i + 1 }}
          </td>
        </ng-container>

        <!-- Order Number Column -->
        <ng-container matColumnDef="Store_ID">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Store_ID"
          >
          Store ID
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.Store_ID }}
          </td>
        </ng-container>

        <!-- Order Date Column -->
        <ng-container matColumnDef="Store_Name">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Store_Name"
          >
            Store Name
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.Store_Name }}
          </td>
        </ng-container>

        <ng-container matColumnDef="IntegrationStartDate">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by IntegrationStartDate"
          >
            Integration Start Date
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.IntegrationStartDate | date: 'dd-MMM-yyyy' }}
          </td>
        </ng-container>

        <!-- Status Column -->
        <!-- <ng-container matColumnDef="Year2023">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Year2023"
          >
           2023
          </th>
          <td mat-cell *matCellDef="let element" [ngStyle]="{ 'background-color': (element.Year2023 == 0 || element.Year2023 == undefined) ? '#eb6f6f' : 'transparent' }">
            <span *ngIf="element.Year2023 == 0 || element.Year2023 == undefined">{{ element.Year2023 || 0 }}</span>
            <span *ngIf="element.Year2023 > 0" >
                {{ element.Year2023 }}
            </span>        
        </td>
        </ng-container> -->

        <!-- <ng-container matColumnDef="Year2024">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Year2024"
          >
           2024
          </th>
          <td mat-cell *matCellDef="let element" [ngStyle]="{ 'background-color': (element.Year2024 == 0 || element.Year2024 == undefined) ? '#eb6f6f' : 'transparent' }">
            <span *ngIf="element.Year2024 == 0 || element.Year2024 == undefined">{{ element.Year2024 || 0 }}</span>
            <span *ngIf="element.Year2024 > 0" >
                {{ element.Year2024 }}
            </span>        
        </td>
        </ng-container> -->

        <ng-container matColumnDef="Year2025">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Year2025"
          >
           2025
          </th>
          <td mat-cell *matCellDef="let element" [ngStyle]="{ 'background-color': (element.Year2025 == 0 || element.Year2025 == undefined) ? '#eb6f6f' : 'transparent' }">
            <span *ngIf="element.Year2025 == 0 || element.Year2025 == undefined">{{ element.Year2025 || 0 }}</span>
            <span *ngIf="element.Year2025 > 0" >
                {{ element.Year2025 }}
            </span>        
        </td>
        </ng-container>

        <ng-container matColumnDef="Year2026">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by Year2026"
          >
           2026
          </th>
          <td mat-cell *matCellDef="let element" [ngStyle]="{ 'background-color': (element.Year2026 == 0 || element.Year2026 == undefined) ? '#eb6f6f' : 'transparent' }">
            <span *ngIf="element.Year2026 == 0 || element.Year2026 == undefined">{{ element.Year2026 || 0 }}</span>
            <span *ngIf="element.Year2026 > 0" >
                {{ element.Year2026 }}
            </span>        
        </td>
        </ng-container>

        

      


        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
    <mat-paginator
      [pageSizeOptions]="[50, 100, 200]"
      showFirstLastButtons
      aria-label="Select page of periodic elements"
    >
    </mat-paginator>
  </div>
</div>

<div *ngIf="loading" class="cssload-container">
  <div class="cssload-speeding-wheel"></div>
</div>
