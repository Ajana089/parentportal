<div class="close-button d-flex justify-content-end">
  <button class="btn-close1" mat-icon-button (click)="closeDialog()">X</button>
</div>
<div class="container product home-product">
  <div class="row">
    <div class="col-5">
      <img
        [src]="product_image_url"
        alt="{{ product_name }}"
        style="width: 100%; border: 1px solid rgba(0, 0, 0, 0.1)"
        (error)="setDefaultImage($event)"
      />
    </div>
    <div class="col-7">
      <h3>{{ product_name }}</h3>
      <p>
        Specifications: <br /><strong>{{ product_specs }}</strong>
      </p>
      <p class="product-desc">
        Item Code: <span class="product-desc-value">{{ product_code }}</span>
      </p>
      <p class="product-desc">
        Grade: <span class="product-desc-value">{{ product_grade }}</span>
      </p>
      <p class="mb-0 product-desc">
        Category: <span class="product-desc-value">{{ product_category }}</span>
      </p>
      <p class="mb-0 product-desc">
        Item Type:
        <span class="product-desc-value">{{ product_item_type }}</span>
      </p>
      <p class="mb-0 product-desc">
        UOM:
        <span class="product-desc-value">{{ product_uom }}</span>
      </p>
      <table class="variations d-none" cellspacing="0">
        <tbody>
          <tr>
            <td
              class="label"
              style="vertical-align: baseline; padding-top: 10px"
            >
              <label for="pa_size" class="m-0" style="font-weight: bold"
                >Suggested Quantity:</label
              >
            </td>
          </tr>
          <tr>
            <td class="value">
              <div class="radio-group">
                <div
                  class="radio-button"
                  *ngFor="let item of suggestedQty"
                  (click)="setSuggQty(item)"
                >
                  <div>
                    <label for="var1" class="size-category">
                      {{ item.qtyValue }}
                    </label>
                  </div>
                </div>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <hr />
      <p class="product-price">AED {{ product_unit_cost }}</p>
      <!-- <div class="stock-meter-container">
       <p class="stock-meter-value" [class.out-of-stock]="stock === 0">
          {{ itemStock }}
        </p>
        <div
          class="stock-meter"
          [class.below-threshold]="stock >= 1 && stock <= stockThreshold"
          [style.width.%]="stockPercentage"
        ></div> 
      </div>-->

      <div class="d-flex flex-row align-items-center my-3">
        <mat-icon
          class="product-quantity-button"
          style="color: #e93119"
          (click)="removeItemFromOrder()"
          >do_not_disturb_on</mat-icon
        >
        
        <mat-form-field class="full-width" appearance="outline">
          <mat-label class="filter-label">Quantity</mat-label>
          <input
            class="filter-text"
            #qty
            matInput
            name="selectedQty"
            ngxir-pattern="^[1-3]*$"  
            placeholder="Enter Quantity"
            (input)="validateQuantity($event)"
            type="number"
          />
        </mat-form-field>
        <mat-icon
          class="product-quantity-button"
          style="color: #00a94f"
          (click)="addItemToOrder()"
          >add_circle</mat-icon
        >
      </div>

      <div class="add-to-cart-containe0r d-flex">
        <button
          [disabled]="disableControls"
          (click)="addToCart()"
          class="add-to-cart-button d-flex align-items-center cs-btn btn-confirm"
        >
          <mat-icon class="add-to-cart-icon">add_shopping_cart</mat-icon>
          <p class="add-to-cart-message">ADD TO CART</p>
        </button>
      </div>
    </div>
  </div>
</div>
