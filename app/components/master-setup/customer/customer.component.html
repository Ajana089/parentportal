<div class="container-fluid view-order">
  <div>
    <div class="filter-container justify-content-between">
      <div class="topbar-search">
        <i
          class="fa-solid fa-magnifying-glass"
          style="color: var(--muted); font-size: 13px"
        ></i>
        <input type="text" (keyup)="applyFilter($event)" placeholder="Search" />
      </div>
      <button class="icon-btn" (click)="openAddDialog()" mat-icon-button>
        <mat-icon>add</mat-icon>
      </button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table
        mat-table
        matTableExporter
        [dataSource]="dataSource"
        matSort
        (matSortChange)="announceSortChange($event)"
        #exporter="matTableExporter"
      >
        <ng-container matColumnDef="AccountNumber">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by AccountNumber"
          >
            Account Number
          </th>
          <td mat-cell *matCellDef="let element" class="clickable-value">
            {{ element.AccountNumber }}
          </td>
        </ng-container>

        <ng-container matColumnDef="OrganizationName">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by OrganizationName"
          >
            Account Name
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.OrganizationName }}
          </td>
        </ng-container>

        <ng-container matColumnDef="CustomerType">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by CustomerType"
          >
            Customer Type
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.CustomerType }}
          </td>
        </ng-container>

        <ng-container matColumnDef="AccountDescription">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by AccountDescription"
          >
            Account Description
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.AccountDescription }}
          </td>
        </ng-container>

        <ng-container matColumnDef="RegistryID">
          <th
            mat-header-cell
            *matHeaderCellDef
            mat-sort-header
            sortActionDescription="Sort by RegistryID"
          >
            Registry ID
          </th>
          <td mat-cell *matCellDef="let element">
            {{ element.RegistryID }}
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          (click)="rowClicked(row)"
          class="clickable-row"
        ></tr>
      </table>

      <mat-paginator
        [pageSizeOptions]="[50, 100, 200]"
        showFirstLastButtons
        aria-label="Select page of periodic elements"
      >
      </mat-paginator>
    </div>
  </div>
</div>

<div *ngIf="loading" class="cssload-container">
  <div class="cssload-speeding-wheel"></div>
</div>
