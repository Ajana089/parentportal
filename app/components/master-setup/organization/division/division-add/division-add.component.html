<div class="crm-body">
  <form [formGroup]="productForm" (ngSubmit)="onSave()" class="signin-form">
    <main id="content" style="min-height: 100vh">
      <!-- Card 1: Company Information -->
      <div class="form-card">
        <div class="form-card-header" (click)="toggleCard('card1')">
          <div class="form-card-title">
            <div class="form-card-icon ic-red">
              <i class="fa-solid fa-building"></i>
            </div>
            <div>
              <div class="form-card-label">
                Division Information
                <span class="form-card-required-badge">Required</span>
              </div>
            </div>
          </div>
          <i
            class="fa-solid fa-chevron-up form-card-toggle"
            [class.open]="!collapsedCards['card1']"
          ></i>
        </div>
        <div class="form-card-body" [class.collapsed]="collapsedCards['card1']">
          <div class="row gy-4">
            
            <div class="col-12 col-md-6">
              <label class="form-label-crm"
                     >Business Unit<span class="req">*</span>
                     </label>
                     <mat-form-field class="w-100" appearance="outline">
                     <mat-label>Select Business Unit</mat-label>
                     <mat-select formControlName="BusinessUnitID">
                     <mat-option *ngFor="let item of  businessid" [value]="item.ID">
                     {{item.BUName}}
                     </mat-option>
                     </mat-select>
                     </mat-form-field>
            </div>
           
            <div class="col-12 col-md-6">
              <label class="form-label-crm"
                >Division Code <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                  class="filter-text"
                  matInput
                  formControlName="DivisionCode"
                  [readonly]="isDisabled"
                />
              </mat-form-field>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label-crm"
                >Division Name <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                  class="filter-text"
                  matInput
                  formControlName="DivisionName"
                  [readonly]="isDisabled"
                />
              </mat-form-field>
            </div>
            
            <div class="col-12 col-md-6">
              <label class="form-label-crm">Oracle Segment ID </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                  class="filter-text"
                  matInput
                  formControlName="OracleSegmentID"
                  [readonly]="isDisabled"
                />
              </mat-form-field>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label-crm">Manager Email</label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                  class="filter-text"
                  matInput
                  formControlName="ManagerEmail"
                  [readonly]="isDisabled"
                />
              </mat-form-field>
            </div>
            
            <div class="col-12 col-md-6" *ngIf="request_id > 0">
              <label class="form-label-crm">Status </label>
              <mat-radio-group
                class="w-100"
                appearance="outline"
                formControlName="Status"
                aria-label="Select an option"
              >
                <mat-radio-button [value]="true">Active</mat-radio-button>
                <mat-radio-button [value]="false">Inactive</mat-radio-button>
              </mat-radio-group>
            </div>
            <div class="col-12 col-md-6">
              <label class="form-label-crm">Cost Center Code </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                  class="filter-text"
                  matInput
                  formControlName="CostCenterCode"
                  [readonly]="isDisabled"
                />
              </mat-form-field>
            </div>
          </div>
         
        </div>
      </div>
    </main>
    <!-- STICKY ACTION BAR -->
    <div class="form-action-bar">
      <div class="form-action-bar-left"></div>
      <div class="form-action-bar-right">
        <button class="btn-crm btn-crm-blue" type="submit" *ngIf="!isDisabled">
          <i class="fa-solid fa-paper-plane"></i>
          {{
            request_id > 0 ? "Update Division Master" : "Add Division Master"
          }}
        </button>
      </div>
    </div>
  </form>
</div>

<div *ngIf="loading" class="cssload-container">
  <div class="cssload-speeding-wheel"></div>
</div>
