<div class="crm-body">
    <form [formGroup]="productForm" (ngSubmit)="onSave()" class="signin-form">
    <main id="content" style="min-height: 100vh">
         <div class="form-card">
          <div class="form-card-header" (click)="toggleCard('card1')">
          <div class="form-card-title">
            <div class="form-card-icon ic-red">
              <i class="fa-solid fa-building"></i>
            </div>
            <div>
              <div class="form-card-label">
               Other Charges Master
               <span class="form-card-required-badge">Required</span>
              </div>
            </div>
          </div>
          <i
            class="fa-solid fa-chevron-up form-card-toggle"
            [class.open]="!collapsedCards['card1']"
          ></i>
        </div>
        <div class="form-card-body" [class.collapsed]="collapsedCards['card1']">
        
      <div class="row gy-4">
      <div class="col-12 col-md-6">
      <label class="form-label-crm"
                >Prod Type Code <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
              
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label-crm"
                >Name <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
               
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
     </div>
     
      <div class="row gy-4">
      <div class="col-12 col-md-6">
      <label class="form-label-crm"
                >Code <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
             
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
      <div class="col-12 col-md-6">
        <mat-checkbox class="example-margin">equipment Rental</mat-checkbox>
      </div>
     </div>
     
    
      <div class="row gy-4">
      <div class="col-12 col-md-6">
      <label class="form-label-crm"
                >Sort ID<span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
             
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label-crm"
                >Minimam Quantity <span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
            
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
     </div>
     
       <div class="row gy-4">
      <div class="col-12 col-md-6">
      <label class="form-label-crm"
                >Selling Price<span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
             
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label-crm"
                >Minimam Charge<span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
            
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
     </div>

      <div class="row gy-4">
      <div class="col-12 col-md-6">
      <label class="form-label-crm"
                >Min Term<span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
             
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label-crm"
                >UOM Type<span class="req">*</span>
              </label>
              <mat-form-field class="w-100" appearance="outline">
                <input
                class="filter-text"
                matInput
            
              [readonly]="isDisabled"
                />
              </mat-form-field>
      </div>
     </div>
    
       <div class="row gy-4">
        <div class="col-12 col-md-6">
          <label class="form-label-crm">Invoice Qty Type
            <span class="req">*</span> </label>
              <mat-radio-group
                class="w-100"
                appearance="outline"
            
                aria-label="Select an option"
              >
              <mat-radio-button value="MeterCube">MeterCube</mat-radio-button>
              <mat-radio-button value="Trip">Trip</mat-radio-button>
               <mat-radio-button value="LumpSum">LumpSum</mat-radio-button>
              </mat-radio-group>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label-crm">Pump Applicable DN(Y/N)
            <span class="req">*</span> </label>
              <mat-radio-group
                class="w-100"
                appearance="outline"
            
                aria-label="Select an option"
              >
              <mat-radio-button value="Yes">Yes</mat-radio-button>
              <mat-radio-button value="No">No</mat-radio-button>
              
              </mat-radio-group>
        </div>
       </div>
      
  
    
    

      
 </div>
</div>
    </main>
     <div class="form-action-bar">
      <div class="form-action-bar-left"></div>
      <div class="form-action-bar-right">
        <button class="btn-crm btn-crm-blue" type="submit" *ngIf="!isDisabled">
          <i class="fa-solid fa-paper-plane"></i>
          {{ request_id > 0 ? "Update Other Charges Master" : "Add  Other Charges Master" }}
        </button>
      </div>
    </div>
  </form>
</div>
<div *ngIf="loading" class="cssload-container">
  <div class="cssload-speeding-wheel"></div>
</div>
