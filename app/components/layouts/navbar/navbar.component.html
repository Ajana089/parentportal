<header class="topbar" (click)="closeAll()">
  <!-- Sidebar Toggle -->
  <button
    class="topbar-toggle"
    (click)="$event.stopPropagation(); layout.toggleSidebar()"
  >
    <i class="fa-solid fa-bars"></i>
  </button>

  <!-- Breadcrumb -->
  <div class="topbar-breadcrumb">
    <span class="page-title">{{ getTitle() }}</span>
  </div>

  <!-- Search -->
  <!-- <div class="topbar-search">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" placeholder="Search customers, projects, RFQs…"/>
  </div> -->

  <!-- Actions -->
  <div class="topbar-actions">
    <!-- Notifications -->
    <div class="crm-dropdown-wrap" (click)="$event.stopPropagation()">
      <button class="topbar-btn" (click)="toggleNotifications()">
        <i class="fa-solid fa-bell"></i>
        <span class="badge-dot"></span>
      </button>
      <div class="crm-dropdown-menu notif-menu" [class.open]="notifOpen()">
        <div class="notif-head">
          <strong>Notifications</strong>
          <button class="btn-sm-link">Mark all read</button>
        </div>
        <div class="notif-item" *ngFor="let n of notifications">
          <div class="notif-icon" [ngClass]="n.iconClass">
            <i class="fa-solid {{ n.icon }}"></i>
          </div>
          <div class="notif-text">
            <div class="notif-title">{{ n.title }}</div>
            <div class="notif-sub">{{ n.sub }}</div>
          </div>
          <div class="notif-time">{{ n.time }}</div>
        </div>
      </div>
    </div>

    <!-- Messages -->
    <!-- <button class="topbar-btn">
      <i class="fa-solid fa-envelope"></i>
      <span class="badge-dot blue"></span>
    </button> -->

    <!-- Fullscreen -->
    <!-- <button class="topbar-btn d-md" (click)="toggleFullscreen($event)">
      <i class="fa-solid" [ngClass]="isFullscreen() ? 'fa-compress' : 'fa-expand'"></i>
    </button> -->

    <!-- User Profile -->
    <div class="crm-dropdown-wrap" (click)="$event.stopPropagation()">
      <button class="user-profile-btn" (click)="toggleProfile()">
        <div class="user-avatar">A</div>
        <div class="user-profile-info">
          <div class="user-profile-name">{{ first_name }}</div>
          <div class="user-profile-role">Administrator</div>
        </div>
        <i class="fa-solid fa-chevron-down chevron"></i>
      </button>
      <div class="crm-dropdown-menu profile-menu" [class.open]="profileOpen()">
        <!-- <a class="crm-dropdown-item" href="#">
          <i class="fa-solid fa-user"></i> My Profile
        </a>
        <a class="crm-dropdown-item" href="#">
          <i class="fa-solid fa-gear"></i> Account Settings
        </a>
        <a class="crm-dropdown-item" href="#">
          <i class="fa-solid fa-shield-halved"></i> Security
        </a>
        <div class="crm-dropdown-divider"></div> -->
        <a class="crm-dropdown-item danger" (click)="logout()">
          <i class="fa-solid fa-arrow-right-from-bracket"></i> Sign Out
        </a>
      </div>
    </div>
  </div>
</header>
