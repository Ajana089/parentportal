<div class="master">
  
  <div class="container-fluid view-order">
    <div class="d-flex align-items-center justify-content-between" style="margin-bottom: 30px; margin-top: 30px;">
        <!-- Left: Icon + Title -->
        <div class="d-flex align-items-center">
            <mat-icon
            style="
                font-size: 35px;
                color: #d3d3d4;
                margin-right: 10px;
                width: 35px;
                height: 35px;
            "
            >sync_alt</mat-icon
            >
            <h5 class="mb-0" style="font-weight: 700">
            Transfer Customer
            </h5>
        </div>

        <!-- Right: Close Button -->
        <div>
            <button class="btn-close1" mat-icon-button (click)="closeDialog()">
            X
            </button>
        </div>
        </div>

    </div>

    
</div>

<div class="main-content" style="    overflow: hidden;     padding-bottom: 30px;">
  <section class="container-fluid white-bg">
    <div class="row">
        <div class="col-12">
            <div class="counter-item" [class.selected]="selectedCounter === counter" 
            *ngFor="let counter of counters; let i = index" (click)="selectItem(counter)">
                {{ i + 1 }} . {{counter.counter_name}}
            </div>

             <!-- Footer Action -->
            <div class="action-footer">
            <button
                class="btn btn-success"
                [disabled]="!selectedCounter"
                (click)="transfer()"
            >
                Transfer
            </button>
            </div>
        </div>
         
    </div>
</section>
</div>
