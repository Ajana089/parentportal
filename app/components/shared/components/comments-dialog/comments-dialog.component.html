<div class="p-5">
    <h1 class="align-center" mat-dialog-title>
        {{title}}
    </h1>

    <div class="align-center" mat-dialog-content>
        <mat-form-field class="full-width">
            <input [(ngModel)]="comments" matInput placeholder="Comments" required>
        </mat-form-field>
    </div>

    <div class="mt-20 flex-horizontal-center" mat-dialog-actions>
        <button mat-raised-button color="warn" (click)="onDismiss()">No</button>
        <button mat-raised-button color="primary" (click)="onConfirm()">Yes</button>
    </div>
</div>
