<div class="container">
  <table class="table">
  <thead>
    <tr>
      <th scope="col">#</th>
      <th scope="col">Token  Number</th>
      <th scope="col">Status</th>
      <th scope="col">ParentName</th>
      <th scope="col">Childname</th>
      <th scope="col">Phone</th>
      
    </tr>
  </thead>
  <tbody>
    
    <tr *ngFor="let item of tokenarray; let i = index">
      <th scope="row">{{i+1}}</th>
      <td>{{item.token}}</td>
      <td [ngClass]="{
  'gree': item.state === 'complete',
  'orang': item.state === 'waiting'
}">{{item.state}}</td>
      <td>{{item.parent}}</td>
      <td>{{item.child}}</td>
      <td>{{item.mobile}}</td>
    </tr>
 
  </tbody>
</table>
</div>
